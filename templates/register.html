{% extends "base.html" %}

{% block content %}
<div class="contenedor-formularios">
    <div class="formulario-1">

        <div class="texto-formulario-1">
            <h2>Registrate</h2>
        </div>

        <form method="POST">
            <input type="text" placeholder="Primer nombre" name="firstname">
            <input type="text" placeholder="Apellido" name="lastname">
            <input type="text" placeholder="Nombre de usuario" name="username">
            <input type="text" placeholder="Correo" name="email">
            <input type="password" id="password" placeholder="Contrasena" name="password">
                <!-- oculto al inicio -->
            <input type="password" id="confirm" placeholder="Confirmar contraseña" name="confirmation" style="display: none;">

        <button type="submit">Registrarse</button>

        </form>

        <script>
            const passwordInput = document.getElementById("password");
            const confirmInput = document.getElementById("confirm");

            passwordInput.addEventListener("input", function() {
                if (passwordInput.value.length > 0) {
                    confirmInput.style.display = "block";
                } else {
                    confirmInput.style.display = "none";
                }
            });
        </script>
</div>



</body>
{% endblock %}
